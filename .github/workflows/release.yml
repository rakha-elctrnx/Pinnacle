name: 'Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: aarch64-apple-darwin
            label: 'macOS ARM64'
          - platform: 'macos-latest'
            target: x86_64-apple-darwin
            label: 'macOS Intel'
          - platform: 'windows-latest'
            target: x86_64-pc-windows-msvc
            label: 'Windows'
          - platform: 'ubuntu-22.04'
            target: x86_64-unknown-linux-gnu
            label: 'Linux'

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Rust toolchain (macOS Intel cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build & Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pinnacle ${{ github.ref_name }}'
          releaseBody: |
            ## Pinnacle ${{ github.ref_name }}

            See the assets below to download the installer for your platform.

            ### macOS Users
            If you get **"Pinnacle is damaged and can't be opened"**, run this in Terminal after extracting:
            ```bash
            xattr -cr /path/to/Pinnacle.app
            ```
            Or go to **System Settings → Privacy & Security** and click **Open Anyway**.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
